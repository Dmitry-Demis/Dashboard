<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дашборд — Cpp Quest</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#060d1a;color:#e2e8f0;min-height:100vh}
.glass{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;backdrop-filter:blur(12px)}
.upload-zone{border:2px dashed rgba(99,102,241,.4);border-radius:20px;transition:all .3s;cursor:pointer}
.upload-zone:hover,.upload-zone.drag{border-color:#6366f1;background:rgba(99,102,241,.06)}
.sec-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);border-radius:999px;padding:4px 14px 4px 6px;margin-bottom:14px}
.sec-num{width:24px;height:24px;background:#6366f1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:900;color:#fff}
.sec-label{font-size:.75rem;font-weight:700;color:#818cf8;letter-spacing:.04em}
.q-title{font-size:.72rem;font-weight:600;color:#94a3b8;line-height:1.4;margin-bottom:10px}
.avg-big{font-size:1.6rem;font-weight:900;line-height:1}
.avg-sub{font-size:.6rem;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.lollipop-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.lollipop-label{font-size:.65rem;font-weight:700;width:16px;text-align:right;flex-shrink:0}
.lollipop-track{flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;position:relative}
.lollipop-fill{height:100%;border-radius:2px;position:absolute;top:0;left:0;transition:width .8s cubic-bezier(.22,1,.36,1)}
.lollipop-dot{width:10px;height:10px;border-radius:50%;position:absolute;top:50%;transform:translate(-50%,-50%);border:2px solid #060d1a;transition:left .8s cubic-bezier(.22,1,.36,1)}
.lollipop-meta{display:flex;gap:4px;flex-shrink:0;align-items:center}
.lollipop-count{font-size:.62rem;font-weight:700;color:#475569;width:18px;text-align:right}
.lollipop-pct{font-size:.62rem;color:#334155;width:28px;text-align:right}
.scale-labels{display:flex;justify-content:space-between;font-size:.58rem;color:#334155;margin-top:6px;padding-left:24px;padding-right:50px}
.donut-wrap{position:relative}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.leg-item{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-text{font-size:.68rem;color:#94a3b8;flex:1;line-height:1.2}
.leg-n{font-size:.68rem;font-weight:700;color:#cbd5e1;flex-shrink:0}
.leg-pct{font-size:.65rem;color:#475569;width:32px;text-align:right;flex-shrink:0}
.mbar-row{margin-bottom:8px}
.mbar-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.mbar-label{font-size:.67rem;color:#94a3b8;line-height:1.2;flex:1;padding-right:8px}
.mbar-val{font-size:.67rem;font-weight:800;flex-shrink:0}
.mbar-track{height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.mbar-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.22,1,.36,1)}
.stat-tile{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px;text-align:center}
.stat-val{font-size:1.8rem;font-weight:900;line-height:1;margin-bottom:4px}
.stat-lbl{font-size:.62rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.07em}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:5px;font-size:.6rem;font-weight:800;flex-shrink:0;margin-right:4px}
.feedback-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px}
.feedback-item{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.feedback-item:last-child{border-bottom:none}
.feedback-good{border-left:3px solid #10b981;padding-left:10px;margin-bottom:6px;font-size:.75rem;color:#d1fae5;line-height:1.5}
.feedback-improve{border-left:3px solid #6366f1;padding-left:10px;margin-bottom:6px;font-size:.75rem;color:#c7d2fe;line-height:1.5}
.feedback-sep{height:1px;background:rgba(255,255,255,.06);margin:8px 0}
</style>
</head>
<body>

<!-- UPLOAD -->
<div id="upload-screen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="max-width:440px;width:100%;text-align:center">
    <div style="width:64px;height:64px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 20px;box-shadow:0 0 40px rgba(99,102,241,.4)">🎮</div>
    <h1 style="font-size:1.8rem;font-weight:900;color:#fff;margin-bottom:8px;letter-spacing:-.02em">Cpp Quest — Опрос</h1>
    <p style="color:#475569;margin-bottom:16px;font-size:.9rem">Загрузите CSV с результатами опроса</p>
    <a href="index.html" style="display:inline-flex;align-items:center;gap:8px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);border-radius:12px;padding:8px 16px;color:#818cf8;font-size:.8rem;font-weight:700;text-decoration:none;margin-bottom:20px;transition:background .2s" onmouseover="this.style.background='rgba(99,102,241,.25)'" onmouseout="this.style.background='rgba(99,102,241,.15)'">📊 Дашборд опроса →</a>
    <a href="index.html" style="display:inline-flex;align-items:center;gap:8px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);border-radius:12px;padding:8px 16px;color:#818cf8;font-size:.8rem;font-weight:700;text-decoration:none;margin-bottom:20px;transition:background .2s" onmouseover="this.style.background='rgba(99,102,241,.25)'" onmouseout="this.style.background='rgba(99,102,241,.15)'">🎮 Вуз. Опрос ←</a>
    <div class="upload-zone" id="drop-zone" style="padding:44px 24px" onclick="document.getElementById('fi').click()">
      <div style="font-size:2.8rem;margin-bottom:12px">📂</div>
      <p style="color:#94a3b8;font-weight:700;margin-bottom:4px">Перетащите файл сюда</p>
      <p style="color:#334155;font-size:.8rem">или нажмите для выбора .csv</p>
      <input type="file" id="fi" accept=".csv" style="display:none">
    </div>
    <p id="err" style="color:#ef4444;font-size:.8rem;margin-top:12px;display:none"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash" style="display:none">
  <div style="position:sticky;top:0;z-index:50;background:rgba(6,13,26,.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06);padding:12px 24px;display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:34px;height:34px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem">🎮</div>
      <div>
        <div style="font-weight:800;color:#fff;font-size:.95rem;letter-spacing:-.01em">Cpp Quest — Опрос</div>
        <div style="color:#334155;font-size:.68rem" id="sub">Результаты опроса</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <a href="index.html" style="color:#475569;font-size:.75rem;font-weight:600;text-decoration:none;transition:color .2s" onmouseover="this.style.color='#94a3b8'" onmouseout="this.style.color='#475569'">← Дашборд опроса</a>
      <button onclick="resetDash()" style="color:#475569;font-size:.75rem;font-weight:600;background:none;border:none;cursor:pointer;transition:color .2s" onmouseover="this.style.color='#94a3b8'" onmouseout="this.style.color='#475569'">↩ Другой файл</button>
    </div>
  </div>
  <div style="max-width:1440px;margin:0 auto;padding:20px 20px 40px" id="content"></div>
</div>

<script>
// ── CSV ───────────────────────────────────────────────────────────────────────
function parseCSV(txt){
  // Парсим весь текст целиком, учитывая переносы строк внутри кавычек
  const rows=[], fields=[];
  let cur='', inQ=false, i=0;
  const s=txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  while(i<s.length){
    const ch=s[i];
    if(ch==='"'){
      if(inQ&&s[i+1]==='"'){cur+='"';i+=2;continue;} // escaped quote
      inQ=!inQ;i++;continue;
    }
    if(ch===','&&!inQ){fields.push(cur.trim());cur='';i++;continue;}
    if(ch==='\n'&&!inQ){fields.push(cur.trim());rows.push(fields.slice());fields.length=0;cur='';i++;continue;}
    cur+=ch;i++;
  }
  fields.push(cur.trim());
  if(fields.some(x=>x))rows.push(fields.slice());
  if(!rows.length)return [];
  const hdr=rows[0];
  return rows.slice(1).map(vals=>{
    const o={};
    hdr.forEach((h,i)=>o[h.trim()]=(vals[i]||'').trim());
    return o;
  }).filter(r=>Object.values(r).some(x=>x));
}
function multi(v){return v?v.split(';').map(s=>s.trim()).filter(Boolean):[]}

// ── PALETTE & HELPERS ─────────────────────────────────────────────────────────
const PAL=['#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#3b82f6','#ef4444','#14b8a6','#f97316','#a855f7','#06b6d4','#84cc16'];
const pc=i=>PAL[i%PAL.length];
const HINTS=['Ужасно','Очень плохо','Плохо','Посредственно','Ниже среднего','Средне','Выше среднего','Хорошо','Очень хорошо','Отлично','Превосходно'];
function rCol(v){return v<=2?'#ef4444':v<=4?'#f97316':v<=5?'#f59e0b':v<=7?'#84cc16':'#10b981'}
function avgCol(v){if(v===null)return '#334155';return v<=2?'#ef4444':v<=4?'#f97316':v<=5?'#f59e0b':v<=7?'#84cc16':'#10b981'}
// avg: excludeZero=true для сравнения форматов (0=не знаю/не применимо)
function avg(arr, excludeZero=false){
  const n=arr.filter(x=>x!==''&&x!==null&&x!==undefined).map(Number).filter(x=>!isNaN(x)&&(excludeZero?x>0:x>=0));
  return n.length?+(n.reduce((a,b)=>a+b,0)/n.length).toFixed(2):null;
}
function countV(arr){const m={};arr.forEach(v=>{if(v&&v.trim())m[v.trim()]=(m[v.trim()]||0)+1;});return m}
function countM(arr){const m={};arr.forEach(cell=>multi(cell).forEach(v=>{m[v]=(m[v]||0)+1;}));return m}
function ratingDist(arr){const d={};arr.forEach(v=>{const n=parseInt(v);if(!isNaN(n)&&n>=0&&n<=10)d[n]=(d[n]||0)+1;});return d}

// ── CHART QUEUE ───────────────────────────────────────────────────────────────
let CQ=[],cid=0;
function nid(){return 'c'+(++cid)}

// ── CARD: RATING (lollipop) ───────────────────────────────────────────────────
function ratingCard(title, values, low, high){
  const dist=ratingDist(values);
  const entries=Object.entries(dist).sort((a,b)=>+b[0]-+a[0]);
  if(!entries.length)return '';
  const total=entries.reduce((s,[,v])=>s+v,0);
  const maxV=Math.max(...entries.map(e=>e[1]),1);
  const a=avg(values);
  const aFmt=a!==null?a.toFixed(1):'—';
  const aColor=avgCol(a);
  const id=nid();
  CQ.push({id,type:'donut',labels:entries.map(e=>HINTS[+e[0]]||e[0]),data:entries.map(e=>e[1]),colors:entries.map(([s])=>rCol(+s))});
  const rows=entries.map(([score,count])=>{
    const pct=Math.round(count/total*100);
    const w=Math.round(count/maxV*100);
    const c=rCol(+score);
    return `<div class="lollipop-row">
      <span class="lollipop-label" style="color:${c}">${score}</span>
      <div class="lollipop-track">
        <div class="lollipop-fill" style="width:${w}%;background:linear-gradient(90deg,${c}88,${c})"></div>
        <div class="lollipop-dot" style="left:${w}%;background:${c}"></div>
      </div>
      <div class="lollipop-meta">
        <span class="lollipop-count">${count}</span>
        <span class="lollipop-pct">${pct}%</span>
      </div>
    </div>`;
  }).join('');
  return `<div class="glass" style="padding:16px">
    <div class="q-title">${title}</div>
    <div style="display:flex;gap:14px;align-items:flex-start">
      <div style="flex:1;min-width:0">${rows}
        <div class="scale-labels"><span>0 — ${low||'мин'}</span><span>10 — ${high||'макс'}</span></div>
      </div>
      <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px">
        <div class="donut-wrap" style="width:120px;height:120px">
          <canvas id="${id}" width="120" height="120"></canvas>
          <div class="donut-center">
            <span class="avg-big" style="color:${aColor}">${aFmt}</span>
            <span class="avg-sub">avg</span>
          </div>
        </div>
        <div style="font-size:.58rem;color:#334155;text-align:center;max-width:80px;line-height:1.3">${a!==null?HINTS[Math.round(a)]||'':''}</div>
      </div>
    </div>
  </div>`;
}

// ── CARD: DONUT ───────────────────────────────────────────────────────────────
function donutCard(title, counts){
  const entries=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  if(!entries.length)return '';
  const total=entries.reduce((s,[,v])=>s+v,0);
  const id=nid();
  const colors=entries.map((_,i)=>pc(i));
  CQ.push({id,type:'donut',labels:entries.map(e=>e[0]),data:entries.map(e=>e[1]),colors});
  const legend=entries.map(([k,v],i)=>`
    <div class="leg-item">
      <div class="leg-dot" style="background:${colors[i]}"></div>
      <span class="leg-text">${k}</span>
      <span class="leg-n">${v}</span>
      <span class="leg-pct">${Math.round(v/total*100)}%</span>
    </div>`).join('');
  return `<div class="glass" style="padding:16px">
    <div class="q-title">${title}</div>
    <div style="display:flex;gap:14px;align-items:center">
      <div class="donut-wrap" style="width:150px;height:150px;flex-shrink:0">
        <canvas id="${id}" width="150" height="150"></canvas>
        <div class="donut-center">
          <span style="font-size:1.2rem;font-weight:900;color:#fff">${total}</span>
          <span style="font-size:.55rem;color:#334155;font-weight:600">ответов</span>
        </div>
      </div>
      <div style="flex:1;min-width:0">${legend}</div>
    </div>
  </div>`;
}

// ── CARD: MULTI-CHOICE ────────────────────────────────────────────────────────
function multiCard(title, counts, n){
  const entries=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  if(!entries.length)return '';
  const maxV=entries[0][1];
  const RANK_COLORS=['#f59e0b','#94a3b8','#cd7c3a'];
  const id=nid();
  const colors=entries.map((_,i)=>pc(i));
  CQ.push({id,type:'donut',labels:entries.map(e=>e[0]),data:entries.map(e=>e[1]),colors});
  const rows=entries.map(([k,v],i)=>{
    const pct=Math.round(v/n*100);
    const w=Math.round(v/maxV*100);
    const c=colors[i];
    const rankBg=i<3?RANK_COLORS[i]:'rgba(255,255,255,.06)';
    const rankColor=i<3?'#000':'#475569';
    return `<div class="mbar-row">
      <div class="mbar-head">
        <span class="mbar-label"><span class="rank-badge" style="background:${rankBg};color:${rankColor}">${i+1}</span>${k}</span>
        <span class="mbar-val" style="color:${c}">${v} <span style="color:#334155;font-weight:400;font-size:.6rem">${pct}%</span></span>
      </div>
      <div class="mbar-track"><div class="mbar-fill" style="width:${w}%;background:linear-gradient(90deg,${c}66,${c})"></div></div>
    </div>`;
  }).join('');
  return `<div class="glass" style="padding:16px">
    <div class="q-title">${title}</div>
    <div style="font-size:.6rem;color:#334155;margin-bottom:10px">% от ${n} респондентов · можно несколько</div>
    <div style="display:flex;gap:16px;align-items:flex-start">
      <div style="flex:1;min-width:0">${rows}</div>
      <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:8px">
        <div class="donut-wrap" style="width:170px;height:170px">
          <canvas id="${id}" width="170" height="170"></canvas>
          <div class="donut-center">
            <span style="font-size:1.4rem;font-weight:900;color:#fff">${entries.reduce((s,[,v])=>s+v,0)}</span>
            <span style="font-size:.5rem;color:#334155;font-weight:600">выборов</span>
          </div>
        </div>
        <div style="width:130px">
          ${entries.map(([k,v],i)=>{
            const total=entries.reduce((s,[,x])=>s+x,0);
            const pct=Math.round(v/total*100);
            return `<div style="display:flex;align-items:center;gap:5px;margin-bottom:4px">
              <div style="width:7px;height:7px;border-radius:50%;background:${colors[i]};flex-shrink:0"></div>
              <span style="font-size:.6rem;color:#94a3b8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${k}</span>
              <span style="font-size:.6rem;font-weight:700;color:${colors[i]};flex-shrink:0">${v} <span style="color:#475569">${pct}%</span></span>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

// ── CARD: COMPARE ────────────────────────────────────────────────────────────
function compareCard(title, key, rows){
  const vuz=[], online=[], site=[];
  rows.forEach(r=>{
    const parts=(r[key]||'').split(';').map(s=>parseFloat(s.trim()));
    if(parts.length===3){vuz.push(parts[0]);online.push(parts[1]);site.push(parts[2]);}
  });
  const aV=avg(vuz, true), aO=avg(online, true), aS=avg(site, true);
  const formats=[['ВУЗ',aV,'#6366f1'],['Онлайн',aO,'#f59e0b'],['Сайт',aS,'#10b981']].sort((a,b)=>(b[1]||0)-(a[1]||0));
  const id=nid();
  CQ.push({id,type:'donut',labels:formats.map(f=>f[0]),data:formats.map(f=>f[1]||0),colors:formats.map(f=>f[2])});
  const bars=formats.map(([lbl,val,c])=>{
    const w=val?Math.round(val/10*100):0;
    return `<div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span style="font-size:.67rem;color:#94a3b8;font-weight:600">${lbl}</span>
        <span style="font-size:.67rem;font-weight:800;color:${c}">${val?val.toFixed(1):'—'}</span>
      </div>
      <div class="mbar-track"><div class="mbar-fill" style="width:${w}%;background:linear-gradient(90deg,${c}66,${c})"></div></div>
    </div>`;
  }).join('');
  const bestVal=formats[0][1], bestColor=formats[0][2];
  return `<div class="glass" style="padding:16px">
    <div class="q-title">${title}</div>
    <div style="display:flex;gap:12px;align-items:center">
      <div style="flex:1">${bars}</div>
      <div class="donut-wrap" style="width:100px;height:100px;flex-shrink:0">
        <canvas id="${id}" width="100" height="100"></canvas>
        <div class="donut-center">
          <span style="font-size:1rem;font-weight:900;color:${bestColor}">${bestVal?bestVal.toFixed(1):'—'}</span>
        </div>
      </div>
    </div>
  </div>`;
}

// ── CARD: COMPARE SUMMARY (итоговое среднее по всем критериям) ────────────────
function compareSummaryCard(rows){
  const keys=['Cmp1_Структура(ВУЗ;Онлайн;Сайт)','Cmp2_Пробелы(ВУЗ;Онлайн;Сайт)','Cmp3_Повторение(ВУЗ;Онлайн;Сайт)','Cmp4_Фидбек(ВУЗ;Онлайн;Сайт)'];
  const vuzAll=[], onlineAll=[], siteAll=[];
  rows.forEach(r=>{
    keys.forEach(k=>{
      const parts=(r[k]||'').split(';').map(s=>parseFloat(s.trim()));
      if(parts.length===3){vuzAll.push(parts[0]);onlineAll.push(parts[1]);siteAll.push(parts[2]);}
    });
  });
  const aV=avg(vuzAll,true), aO=avg(onlineAll,true), aS=avg(siteAll,true);
  const formats=[['ВУЗ',aV,'#6366f1'],['Онлайн',aO,'#f59e0b'],['Сайт',aS,'#10b981']].sort((a,b)=>(b[1]||0)-(a[1]||0));
  const id=nid();
  CQ.push({id,type:'donut',labels:formats.map(f=>f[0]),data:formats.map(f=>f[1]||0),colors:formats.map(f=>f[2])});
  const bars=formats.map(([lbl,val,c])=>{
    const w=val?Math.round(val/10*100):0;
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:.8rem;color:#94a3b8;font-weight:700">${lbl}</span>
        <span style="font-size:.8rem;font-weight:900;color:${c}">${val?val.toFixed(1):'—'} <span style="font-size:.6rem;color:#475569;font-weight:400">/ 10</span></span>
      </div>
      <div class="mbar-track" style="height:8px"><div class="mbar-fill" style="width:${w}%;background:linear-gradient(90deg,${c}66,${c})"></div></div>
    </div>`;
  }).join('');
  return `<div class="glass" style="padding:16px">
    <div class="q-title">Итоговое среднее по всем критериям</div>
    <div style="display:flex;gap:16px;align-items:center">
      <div style="flex:1">${bars}</div>
      <div class="donut-wrap" style="width:120px;height:120px;flex-shrink:0">
        <canvas id="${id}" width="120" height="120"></canvas>
        <div class="donut-center">
          <span style="font-size:1.1rem;font-weight:900;color:#10b981">${aS?aS.toFixed(1):'—'}</span>
          <span style="font-size:.5rem;color:#334155;font-weight:700">сайт</span>
        </div>
      </div>
    </div>
  </div>`;
}

// ── CARD: FEEDBACK (R3/R4) ────────────────────────────────────────────────────
function feedbackCard(rows){
  const items=rows.map(r=>{
    const good=(r['R3_Понравилось']||'').trim();
    const improve=(r['R4_Улучшить']||'').trim();
    if(!good&&!improve)return null;
    return {good, improve, len:(good+improve).length};
  }).filter(Boolean).sort((a,b)=>a.len-b.len).map((x,i)=>({...x,idx:i+1}));

  const short=items.filter(x=>x.len<150);
  const mid=items.filter(x=>x.len>=150&&x.len<400);
  const long=items.filter(x=>x.len>=400);

  const card=({good,improve,idx})=>`
    <div style="background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.2);border-radius:14px;padding:14px;margin-bottom:10px;break-inside:avoid">
      <div style="font-size:.6rem;color:#6366f1;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">Отзыв #${idx}</div>
      ${good?`<div style="margin-bottom:${improve?'10px':'0'}">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
          <svg width="14" height="12" viewBox="0 0 14 12" fill="none"><path d="M0 12V7.2C0 3.2 2.333 1.067 7 0l.933 1.6C5.6 2.133 4.267 3.2 4 5.2H6V12H0ZM8 12V7.2C8 3.2 10.333 1.067 15 0l.933 1.6C13.6 2.133 12.267 3.2 12 5.2H14V12H8Z" fill="#10b981"/></svg>
          <span style="font-size:.62rem;color:#10b981;font-weight:700">Понравилось</span>
        </div>
        <div style="font-size:.75rem;color:#d1fae5;line-height:1.7;font-style:italic;padding-left:4px">«${good.replace(/\n/g,'<br>')}»</div>
      </div>`:''}
      ${good&&improve?`<div style="height:1px;background:rgba(255,255,255,.06);margin:8px 0"></div>`:''}
      ${improve?`<div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
          <svg width="14" height="12" viewBox="0 0 14 12" fill="none"><path d="M0 12V7.2C0 3.2 2.333 1.067 7 0l.933 1.6C5.6 2.133 4.267 3.2 4 5.2H6V12H0ZM8 12V7.2C8 3.2 10.333 1.067 15 0l.933 1.6C13.6 2.133 12.267 3.2 12 5.2H14V12H8Z" fill="#818cf8"/></svg>
          <span style="font-size:.62rem;color:#818cf8;font-weight:700">Улучшить</span>
        </div>
        <div style="font-size:.75rem;color:#c7d2fe;line-height:1.7;font-style:italic;padding-left:4px">«${improve.replace(/\n/g,'<br>')}»</div>
      </div>`:''}
    </div>`;

  const section=(cols,list)=>list.length?`<div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:10px;margin-bottom:10px">${list.map(card).join('')}</div>`:'';

  return `<div>
    <div style="display:flex;gap:16px;margin-bottom:12px;font-size:.65rem;font-weight:700">
      <span style="color:#10b981">❝ Понравилось</span>
      <span style="color:#818cf8">❝ Улучшить</span>
    </div>
    ${section(4,short)}
    ${section(2,mid)}
    ${section(1,long)}
  </div>`;
}

// ── LAYOUT HELPERS ────────────────────────────────────────────────────────────
function sec(num,title,inner){
  return `<div style="margin-bottom:24px">
    <div class="sec-pill"><div class="sec-num">${num}</div><span class="sec-label">${title}</span></div>
    ${inner}
  </div>`;
}
function grid(cols,cards,gap=10){
  const v=cards.filter(Boolean);
  if(!v.length)return '';
  return `<div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:${gap}px">${v.join('')}</div>`;
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(rows){
  CQ=[];cid=0;
  const n=rows.length;
  document.getElementById('sub').textContent=`${n} ответов · Cpp Quest`;

  const aAge=avg(rows.map(r=>+r['Возраст']).filter(x=>!isNaN(x)&&x>0&&x<100));
  const male=rows.filter(r=>r['Пол']==='Мужской').length;

  // Общее среднее по всем числовым рейтинговым блокам
  const ratingKeys=['T1_Покрытие','T2_ХорошоПлохо','T3_Визуализации','I1_Разнообразие','I2_Компилятор','G1_ОпытМонетки','G2_Стрики','G3_Статистика','U1_Дизайн','U2_Анимации','U3_Профиль','R1_Удовлетворённость'];
  const allRatingVals=rows.flatMap(r=>ratingKeys.map(k=>r[k]).filter(v=>v!==''&&v!==undefined));
  const overallAvg=avg(allRatingVals);

  const r2avg=avg(rows.map(r=>+r['R2_Эффективность']).filter(x=>!isNaN(x)));

  let html='';

  // STATS
  html+=`<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px">
    ${[
      [n,'Ответов','#6366f1','📝'],
      [aAge?aAge.toFixed(0):'—','Ср. возраст','#8b5cf6','🎓'],
      [Math.round(male/n*100)+'%','Мужчин','#3b82f6','👤'],
      [overallAvg?overallAvg.toFixed(1):'—','Общий рейтинг','#10b981','⭐'],
      [r2avg?r2avg.toFixed(1):'—','Эффективность','#f59e0b','🚀'],
    ].map(([v,l,c,ic])=>`<div class="stat-tile">
      <div style="font-size:1.1rem;margin-bottom:4px">${ic}</div>
      <div class="stat-val" style="color:${c}">${v}</div>
      <div class="stat-lbl">${l}</div>
    </div>`).join('')}
  </div>`;

  // 1 — О респондентах
  html+=sec(1,'О респондентах',
    grid(4,[
      donutCard('ВУЗ', countV(rows.map(r=>r['ВУЗ']))),
      donutCard('Пол', countV(rows.map(r=>r['Пол']))),
      donutCard('Курс', countV(rows.map(r=>r['Курс']))),
      donutCard('Опыт C++', countV(rows.map(r=>r['Опыт C++']))),
    ])
  );

  // 2 — Сравнение форматов
  html+=sec(2,'Сравнение форматов (ВУЗ / Онлайн / Сайт)',
    grid(5,[
      compareSummaryCard(rows),
      compareCard('Структура и полнота материала', 'Cmp1_Структура(ВУЗ;Онлайн;Сайт)', rows),
      compareCard('Закрытие пробелов в знаниях', 'Cmp2_Пробелы(ВУЗ;Онлайн;Сайт)', rows),
      compareCard('Удобство повторения', 'Cmp3_Повторение(ВУЗ;Онлайн;Сайт)', rows),
      compareCard('Качество обратной связи', 'Cmp4_Фидбек(ВУЗ;Онлайн;Сайт)', rows),
    ])
  );

  // 3 — Качество теории
  html+=sec(3,'Качество теории',
    grid(3,[
      ratingCard('Покрытие теории тестами', rows.map(r=>r['T1_Покрытие']), 'Много пробелов', 'Полное покрытие'),
      ratingCard('Блоки «Хорошо/Плохо»', rows.map(r=>r['T2_ХорошоПлохо']), 'Бесполезно', 'Очень полезно'),
      ratingCard('Визуализации (диаграммы, таблицы)', rows.map(r=>r['T3_Визуализации']), 'Не нужны', 'Очень помогают'),
      donutCard('Внимательность изучения', countV(rows.map(r=>r['T4_Внимательность']))),
      donutCard('Чего не хватает в теории', countM(rows.map(r=>r['T5_НеХватает']))),
      donutCard('Предпочтительный формат подачи', countV(rows.map(r=>r['T6_ФорматПодачи']))),
    ])
  );

  // 4 — Интерактивность
  html+=sec(4,'Интерактивность и тесты',
    grid(3,[
      ratingCard('Разнообразие типов заданий', rows.map(r=>r['I1_Разнообразие']), 'Однообразно', 'Отлично'),
      ratingCard('Встроенный компилятор', rows.map(r=>r['I2_Компилятор']), 'Бесполезен', 'Незаменим'),
      donutCard('Баланс сложности тестов', countV(rows.map(r=>r['I3_БалансСложности']))),
      multiCard('Лучшие типы заданий для запоминания', countM(rows.map(r=>r['I4_ТипыЗаданий'])), n),
    ])
  );

  // 5 — Геймификация
  html+=sec(5,'Геймификация и мотивация',
    grid(3,[
      ratingCard('Опыт, монетки, открытие параграфов', rows.map(r=>r['G1_ОпытМонетки']), 'Не мотивирует', 'Сильно мотивирует'),
      ratingCard('Стрики и бонусы', rows.map(r=>r['G2_Стрики']), 'Раздражает', 'Отлично'),
      ratingCard('Статистика в профиле', rows.map(r=>r['G3_Статистика']), 'Бесполезна', 'Очень полезна'),
      donutCard('Что развить в первую очередь', countV(rows.map(r=>r['G4_Приоритет']))),
      donutCard('Пропуск главы через тест', countV(rows.map(r=>r['G5_Пропуск']))),
    ])
  );

  // 6 — UX/UI
  html+=sec(6,'UX / UI',
    grid(3,[
      ratingCard('Дизайн и визуальное оформление', rows.map(r=>r['U1_Дизайн']), 'Плохо', 'Идеально'),
      ratingCard('Анимации и интерактивность', rows.map(r=>r['U2_Анимации']), 'Мешают', 'Отлично'),
      ratingCard('Профиль и статистика', rows.map(r=>r['U3_Профиль']), 'Неудобно', 'Удобно'),
      multiCard('Что вызывает дискомфорт', countM(rows.map(r=>r['U4_Дискомфорт'])), n),
    ])
  );

  // 7 — Итоговые оценки
  html+=sec(7,'Итоговые оценки',
    grid(2,[
      ratingCard('Общая удовлетворённость', rows.map(r=>r['R1_Удовлетворённость']), 'Разочарован', 'Идеально'),
      donutCard('Эффективность vs ВУЗ и курсы', countV(rows.map(r=>r['R2_Эффективность']))),
    ])
  );

  // 8 — Отзывы
  html+=sec(8,'Отзывы: что понравилось и что улучшить', feedbackCard(rows));

  const el=document.getElementById('content');
  el.innerHTML=html;
  document.getElementById('upload-screen').style.display='none';
  document.getElementById('dash').style.display='block';
  requestAnimationFrame(()=>requestAnimationFrame(initCharts));
}

function initCharts(){
  CQ.forEach(cfg=>{
    const el=document.getElementById(cfg.id);
    if(!el)return;
    if(cfg.type==='donut'){
      const total=cfg.data.reduce((a,b)=>a+b,0);
      new Chart(el,{
        type:'doughnut',
        plugins:[ChartDataLabels],
        data:{labels:cfg.labels,datasets:[{data:cfg.data,backgroundColor:cfg.colors,borderColor:'#060d1a',borderWidth:2,hoverOffset:4}]},
        options:{
          cutout:'65%',
          animation:{duration:700,easing:'easeOutQuart'},
          plugins:{
            legend:{display:false},
            tooltip:{callbacks:{label:ctx=>{return ` ${ctx.label}: ${ctx.raw} (${Math.round(ctx.raw/total*100)}%)`}}},
            datalabels:{
              color:'#fff',
              font:{weight:'800',size:9},
              formatter:(val)=>{
                const pct=Math.round(val/total*100);
                if(pct<8)return '';
                return `${pct}%`;
              },
              textAlign:'center',
              display:(ctx)=>Math.round(ctx.dataset.data[ctx.dataIndex]/total*100)>=8,
            }
          }
        }
      });
    }
  });
}

// ── FILE ──────────────────────────────────────────────────────────────────────
function handleFile(f){
  if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const rows=parseCSV(e.target.result);
      if(!rows.length){showErr('Файл пустой');return;}
      render(rows);
    }catch(ex){showErr('Ошибка: '+ex.message);}
  };
  r.readAsText(f,'UTF-8');
}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.style.display='block';}
function resetDash(){
  document.getElementById('dash').style.display='none';
  document.getElementById('upload-screen').style.display='flex';
  document.getElementById('content').innerHTML='';
  CQ=[];cid=0;
}

document.getElementById('fi').addEventListener('change',e=>handleFile(e.target.files[0]));
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');handleFile(e.dataTransfer.files[0]);});
</script>
